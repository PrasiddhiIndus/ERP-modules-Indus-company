name: Indus ERP CI/CD

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security check
        run: npm run security-check

      - name: Smoke tests
        run: npm run test:smoke

      - name: Build Project (staging)
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'pull_request' && github.base_ref == 'staging')
        run: npm run build:staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_EINVOICE_PROVIDER: backend
          VITE_EINVOICE_API_URL: /api/billing/e-invoice

      - name: Build Project (production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_EINVOICE_PROVIDER: backend
          VITE_EINVOICE_API_URL: /api/billing/e-invoice

  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 30m
          envs: PROD_SUPABASE_URL,PROD_SUPABASE_SERVICE_ROLE_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY
          script: |
            set -euxo pipefail
            REPO_DIR=/root/indus-erp
            APP_DIR=/var/www/indus-erp
            REPO_URL="https://github.com/PrasiddhiIndus/ERP-modules-Indus-company.git"

            echo "==> host=$(hostname)"
            ls -la /root | head -40 || true

            # One-time: create git checkout used by deploy (static site stays in APP_DIR)
            if [ ! -d "${REPO_DIR}/.git" ]; then
              echo "==> Cloning production repo into ${REPO_DIR}"
              rm -rf "${REPO_DIR}"
              git clone --branch main --depth 1 "${REPO_URL}" "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            git remote set-url origin "${REPO_URL}" || true
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main

            # Keep server secrets if they already exist beside legacy scripts
            if [ ! -f .env.server ] && [ -f /root/indus-erp-env/.env.server ]; then
              cp /root/indus-erp-env/.env.server .env.server
            fi
            if [ ! -f .env.server ] && [ -f /root/.env.server ]; then
              cp /root/.env.server .env.server
            fi
            if [ ! -f .env.server ] && [ -f .env.server.example ]; then
              cp .env.server.example .env.server
            fi

            # Frontend build env (Vite) — prefer CI secrets when present
            if [ -n "${VITE_SUPABASE_URL:-}" ] && [ -n "${VITE_SUPABASE_ANON_KEY:-}" ]; then
              printf '%s\n' \
                "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
                "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" \
                "VITE_EINVOICE_PROVIDER=backend" \
                "VITE_EINVOICE_API_URL=/api/billing/e-invoice" \
                > .env.production
            fi

            export REPO_DIR APP_DIR
            export PM2_NAME=indus-erp
            bash scripts/deploy.sh

            # Keep legacy entrypoint in sync for manual runs
            cp scripts/deploy.sh /root/deploy.sh
            chmod +x /root/deploy.sh
        env:
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

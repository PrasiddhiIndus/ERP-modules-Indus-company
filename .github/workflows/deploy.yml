name: Indus ERP CI/CD

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security check
        run: npm run security-check

      - name: Smoke tests
        run: npm run test:smoke

      - name: Build Project (staging)
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'pull_request' && github.base_ref == 'staging')
        run: npm run build:staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_EINVOICE_PROVIDER: backend
          VITE_EINVOICE_API_URL: /api/billing/e-invoice

      - name: Build Project (production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_EINVOICE_PROVIDER: backend
          VITE_EINVOICE_API_URL: /api/billing/e-invoice

  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 30m
          envs: PROD_SUPABASE_URL,PROD_SUPABASE_SERVICE_ROLE_KEY
          script: |
            set -euxo pipefail
            echo "==> host=$(hostname) user=$(whoami)"
            ls -la /root | head -40 || true

            if [ -d /root/indus-erp/.git ]; then
              REPO_DIR=/root/indus-erp
            elif [ -d /var/www/indus-erp/.git ]; then
              REPO_DIR=/var/www/indus-erp
            elif [ -f /root/deploy.sh ]; then
              echo "==> Falling back to legacy /root/deploy.sh"
              bash /root/deploy.sh
              exit 0
            else
              echo "ERROR: No production git repo found at /root/indus-erp or /var/www/indus-erp"
              exit 1
            fi

            echo "==> Using REPO_DIR=${REPO_DIR}"
            cd "${REPO_DIR}"
            git remote -v || true
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main
            git clean -fd
            export REPO_DIR
            export APP_DIR="${APP_DIR:-/var/www/indus-erp}"
            export PM2_NAME="${PM2_NAME:-indus-erp}"
            bash scripts/deploy.sh
        env:
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}

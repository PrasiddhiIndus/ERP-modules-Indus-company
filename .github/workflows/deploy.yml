name: Indus ERP CI/CD

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security check
        run: npm run security-check

      - name: Smoke tests
        run: npm run test:smoke

      - name: Build Project (staging)
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'pull_request' && github.base_ref == 'staging')
        run: npm run build:staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VITE_EINVOICE_PROVIDER: backend
          VITE_EINVOICE_API_URL: /api/billing/e-invoice

      - name: Build Project (production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.base_ref == 'main')
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_EINVOICE_PROVIDER: backend
          VITE_EINVOICE_API_URL: /api/billing/e-invoice

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist
          retention-days: 3

  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Download production dist
        uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "dist"
          target: "/tmp/indus-erp-dist-upload"
          overwrite: true

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 30m
          envs: PROD_SUPABASE_URL,PROD_SUPABASE_SERVICE_ROLE_KEY
          # Always run the in-repo script after pull so deploy fixes ship with the app.
          script: |
            set -euo pipefail
            REPO_DIR="${REPO_DIR:-/root/indus-erp}"
            cd "${REPO_DIR}"
            git fetch origin main
            git checkout main
            git pull origin main
            # Flatten scp upload (appleboy may nest as dist/ under target)
            PREBUILT="/tmp/indus-erp-dist"
            rm -rf "${PREBUILT}"
            mkdir -p "${PREBUILT}"
            if [ -f /tmp/indus-erp-dist-upload/dist/index.html ]; then
              cp -a /tmp/indus-erp-dist-upload/dist/. "${PREBUILT}/"
            elif [ -f /tmp/indus-erp-dist-upload/index.html ]; then
              cp -a /tmp/indus-erp-dist-upload/. "${PREBUILT}/"
            else
              echo "ERROR: uploaded dist not found under /tmp/indus-erp-dist-upload"
              find /tmp/indus-erp-dist-upload -maxdepth 3 -type f 2>/dev/null | head -50 || true
              exit 1
            fi
            export SKIP_BUILD=1
            export PREBUILT_DIST="${PREBUILT}"
            bash scripts/deploy.sh
            rm -rf /tmp/indus-erp-dist-upload "${PREBUILT}"
        env:
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}

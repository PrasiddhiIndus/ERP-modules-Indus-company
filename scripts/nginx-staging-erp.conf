# Copy to /etc/nginx/sites-available/staging-erp on the droplet.
# ln -sf /etc/nginx/sites-available/staging-erp /etc/nginx/sites-enabled/staging-erp
# nginx -t && systemctl reload nginx
#
# Staging URL: http://139.59.58.167:3001
# Production stays on indus-erp.in (port 80/443).

server {
    listen 3001;
    server_name 139.59.58.167;

    root /var/www/staging-erp;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Netlify hosts the Vite frontend and the e-invoice API function.
# Keep VITE_EINVOICE_API_URL=/api/billing/e-invoice for same-domain API calls.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
